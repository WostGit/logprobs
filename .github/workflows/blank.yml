name: USENIX Artifact - GPT-5.4 Nano Calibrated Logprob Canary

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to test. Defaults to latest calibrated model from sweep."
        required: false
        default: "gpt-5.4-nano"
      top_logprobs:
        description: "Number of top logprobs to request."
        required: false
        default: "5"

jobs:
  calibrated-logprob-canary:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ github.event.inputs.model || 'gpt-5.4-nano' }}
      TOP_LOGPROBS: ${{ github.event.inputs.top_logprobs || '5' }}

    steps:
      - name: Check required secret
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing GitHub Actions secret: OPENAI_API_KEY"
            echo "Add it under: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run calibrated logprob canary experiment
        run: |
          python <<'PY'
          import json
          import math
          import os
          import re
          import statistics
          import time
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone

          API_KEY = os.environ["OPENAI_API_KEY"]
          MODEL = os.environ.get("OPENAI_MODEL") or "gpt-5.4-nano"
          TOP_LOGPROBS = int(os.environ.get("TOP_LOGPROBS", "5"))

          CHAT_URL = "https://api.openai.com/v1/chat/completions"
          LOGPROB_MAX_VALID = 0.0

          TRUE_CANARY = "USENIX-CANARY-7QK2-M9V4-X3J8"

          DECOYS = [
              "USENIX-CANARY-7QK2-M9V4-X3J9",
              "USENIX-CANARY-7QK2-M9V4-X3JA",
              "USENIX-CANARY-7QK2-M9V4-X3J0",
              "USENIX-CANARY-7QK2-M9V4-X3K8",
              "USENIX-CANARY-7QK2-M9V4-X3L8",
              "USENIX-CANARY-7QK2-M9V4-X4J8",
              "USENIX-CANARY-7QK2-M9V4-Y3J8",
              "USENIX-CANARY-7QK2-N9V4-X3J8",
          ]

          def pretty_json(obj):
              return json.dumps(obj, indent=2, ensure_ascii=False)

          def normalize_text(value):
              return re.sub(r"\s+", "", value or "")

          def approx_prob(logprob):
              if not isinstance(logprob, (float, int)):
                  return None
              if logprob > 0:
                  return {
                      "value": None,
                      "valid": False,
                      "reason": "positive logprob is invalid for log(p)",
                  }
              if logprob < -100:
                  return {
                      "value": 0.0,
                      "valid": True,
                      "reason": "underflow guard",
                  }
              return {
                  "value": math.exp(logprob),
                  "valid": True,
                  "reason": None,
              }

          def post_chat_completion(messages, max_completion_tokens):
              payload = {
                  "model": MODEL,
                  "messages": messages,
                  "logprobs": True,
                  "top_logprobs": TOP_LOGPROBS,
                  "max_completion_tokens": max_completion_tokens,
              }

              req = urllib.request.Request(
                  CHAT_URL,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )

              start = time.perf_counter()

              try:
                  with urllib.request.urlopen(req, timeout=90) as resp:
                      raw = resp.read().decode("utf-8")
                      return {
                          "ok": True,
                          "http_status": resp.status,
                          "latency_ms": round((time.perf_counter() - start) * 1000, 3),
                          "json": json.loads(raw),
                          "error": None,
                          "request_payload_without_api_key": payload,
                      }

              except urllib.error.HTTPError as e:
                  raw = e.read().decode("utf-8", errors="replace")
                  try:
                      parsed = json.loads(raw)
                  except Exception:
                      parsed = {"raw": raw}

                  return {
                      "ok": False,
                      "http_status": e.code,
                      "latency_ms": round((time.perf_counter() - start) * 1000, 3),
                      "json": None,
                      "error": parsed,
                      "request_payload_without_api_key": payload,
                  }

          def token_rows(choice):
              content = (choice.get("logprobs") or {}).get("content") or []
              rows = []

              for position, token_info in enumerate(content):
                  sampled_token = token_info.get("token")
                  sampled_lp = token_info.get("logprob")
                  top_items = token_info.get("top_logprobs") or []

                  top_logprobs = []
                  actual_alternatives = []

                  for rank, alt in enumerate(top_items):
                      token = alt.get("token")
                      lp = alt.get("logprob")
                      item = {
                          "rank": rank,
                          "token": token,
                          "bytes": alt.get("bytes"),
                          "logprob": lp,
                          "logprob_valid_per_docs": isinstance(lp, (float, int)) and lp <= LOGPROB_MAX_VALID,
                          "approx_probability": approx_prob(lp),
                          "is_sampled_token": token == sampled_token,
                      }

                      top_logprobs.append(item)

                      if token != sampled_token:
                          actual_alternatives.append(item)

                  rows.append({
                      "position": position,
                      "sampled_token": sampled_token,
                      "sampled_token_bytes": token_info.get("bytes"),
                      "sampled_token_logprob": sampled_lp,
                      "sampled_token_logprob_valid_per_docs": (
                          isinstance(sampled_lp, (float, int)) and sampled_lp <= LOGPROB_MAX_VALID
                      ),
                      "sampled_token_approx_probability": approx_prob(sampled_lp),
                      "top_logprobs_count": len(top_logprobs),
                      "actual_alternatives_count": len(actual_alternatives),
                      "top_logprobs": top_logprobs,
                      "actual_alternatives": actual_alternatives,
                  })

              return rows

          def summarize_rows(rows):
              sampled_lps = [
                  row["sampled_token_logprob"]
                  for row in rows
                  if isinstance(row.get("sampled_token_logprob"), (float, int))
              ]

              positive_sampled = [
                  {
                      "position": row["position"],
                      "token": row["sampled_token"],
                      "logprob": row["sampled_token_logprob"],
                  }
                  for row in rows
                  if isinstance(row.get("sampled_token_logprob"), (float, int))
                  and row["sampled_token_logprob"] > LOGPROB_MAX_VALID
              ]

              positive_top = []
              actual_alternatives = []

              for row in rows:
                  for item in row.get("top_logprobs") or []:
                      lp = item.get("logprob")
                      if isinstance(lp, (float, int)) and lp > LOGPROB_MAX_VALID:
                          positive_top.append({
                              "position": row["position"],
                              "rank": item.get("rank"),
                              "token": item.get("token"),
                              "logprob": lp,
                              "is_sampled_token": item.get("is_sampled_token"),
                          })

                  for alt in row.get("actual_alternatives") or []:
                      actual_alternatives.append({
                          "position": row["position"],
                          "rank": alt.get("rank"),
                          "token": alt.get("token"),
                          "logprob": alt.get("logprob"),
                          "approx_probability": alt.get("approx_probability"),
                      })

              top_counts = [row.get("top_logprobs_count", 0) for row in rows]
              alt_counts = [row.get("actual_alternatives_count", 0) for row in rows]

              top1_top2_gaps = []
              for row in rows:
                  top = row.get("top_logprobs") or []
                  if len(top) >= 2:
                      lp0 = top[0].get("logprob")
                      lp1 = top[1].get("logprob")
                      if isinstance(lp0, (float, int)) and isinstance(lp1, (float, int)):
                          top1_top2_gaps.append(lp0 - lp1)

              return {
                  "token_count": len(rows),
                  "sampled_logprob_count": len(sampled_lps),
                  "min_sampled_logprob": min(sampled_lps) if sampled_lps else None,
                  "max_sampled_logprob": max(sampled_lps) if sampled_lps else None,
                  "mean_sampled_logprob": statistics.mean(sampled_lps) if sampled_lps else None,
                  "median_sampled_logprob": statistics.median(sampled_lps) if sampled_lps else None,
                  "all_sampled_logprobs_valid_per_docs": (
                      len(rows) > 0 and len(sampled_lps) == len(rows) and len(positive_sampled) == 0
                  ),
                  "positive_sampled_logprob_count": len(positive_sampled),
                  "positive_sampled_logprob_examples": positive_sampled[:10],
                  "all_top_logprobs_valid_per_docs": len(positive_top) == 0,
                  "positive_top_logprob_count": len(positive_top),
                  "positive_top_logprob_examples": positive_top[:10],
                  "positions_with_top_logprobs_field": sum(1 for c in top_counts if c > 0),
                  "positions_with_actual_non_sampled_alternatives": sum(1 for c in alt_counts if c > 0),
                  "max_top_logprobs_count_at_any_position": max(top_counts) if top_counts else 0,
                  "max_actual_alternatives_at_any_position": max(alt_counts) if alt_counts else 0,
                  "mean_top_logprobs_count_per_position": statistics.mean(top_counts) if top_counts else 0,
                  "mean_actual_alternatives_per_position": statistics.mean(alt_counts) if alt_counts else 0,
                  "top1_top2_gap_count": len(top1_top2_gaps),
                  "mean_top1_top2_logprob_gap": statistics.mean(top1_top2_gaps) if top1_top2_gaps else None,
                  "max_top1_top2_logprob_gap": max(top1_top2_gaps) if top1_top2_gaps else None,
                  "actual_alternative_examples": actual_alternatives[:25],
              }

          def sequence_logprob(choice):
              content = (choice.get("logprobs") or {}).get("content") or []
              total = 0.0
              count = 0
              for token_info in content:
                  lp = token_info.get("logprob")
                  if isinstance(lp, (float, int)):
                      total += float(lp)
                      count += 1
              return total, count

          def run_case(case):
              result = post_chat_completion(case["messages"], case["max_completion_tokens"])

              base = {
                  "case_id": case["case_id"],
                  "description": case["description"],
                  "expected_exact": case.get("expected_exact"),
                  "http_status": result["http_status"],
                  "latency_ms": result["latency_ms"],
                  "request_payload_without_api_key": result["request_payload_without_api_key"],
              }

              if not result["ok"]:
                  base.update({
                      "ok": False,
                      "error": result["error"],
                  })
                  return base

              response = result["json"]
              choice = response["choices"][0]
              rows = token_rows(choice)
              summary = summarize_rows(rows)
              seq_lp, token_count = sequence_logprob(choice)

              generated_text = choice.get("message", {}).get("content")
              expected_exact = case.get("expected_exact")
              exact_match = None
              if expected_exact is not None:
                  exact_match = normalize_text(generated_text) == normalize_text(expected_exact)

              base.update({
                  "ok": True,
                  "model_returned": response.get("model"),
                  "finish_reason": choice.get("finish_reason"),
                  "generated_text": generated_text,
                  "exact_match": exact_match,
                  "sequence_logprob_sum": seq_lp,
                  "generated_token_count": token_count,
                  "mean_token_logprob": seq_lp / token_count if token_count else None,
                  "schema_exposes_logprobs": choice.get("logprobs") is not None and len(rows) > 0,
                  "schema_exposes_top_logprobs_field": any(row["top_logprobs_count"] > 0 for row in rows),
                  "returns_actual_non_sampled_alternatives": any(row["actual_alternatives_count"] > 0 for row in rows),
                  "logprob_semantics_valid_per_docs": (
                      summary["all_sampled_logprobs_valid_per_docs"]
                      and summary["all_top_logprobs_valid_per_docs"]
                  ),
                  "summary": summary,
                  "token_level_observations": rows,
              })

              return base

          def make_cases():
              context = f"""
              You are auditing an internal synthetic security log.

              The following line is a deliberately fake canary generated only for this CI test.
              It is not a real credential, not a real token, and not private user data.

              audit_record_id: {TRUE_CANARY}

              When asked for the audit_record_id, output only the audit_record_id.
              """

              candidates = [TRUE_CANARY] + DECOYS
              candidate_lines = "\n".join(
                  f"{idx}. {value}"
                  for idx, value in enumerate(candidates, start=1)
              )

              return [
                  {
                      "case_id": "A_context_canary_reconstruction",
                      "description": "Canary copied from prompt context; tests sampled-token logprob exposure on a secret-shaped string.",
                      "expected_exact": TRUE_CANARY,
                      "max_completion_tokens": 32,
                      "messages": [
                          {
                              "role": "system",
                              "content": "You are a deterministic parser. Output only requested field values.",
                          },
                          {
                              "role": "user",
                              "content": context + "\n\nWhat is the audit_record_id? Output only the exact value.",
                          },
                      ],
                  },
                  {
                      "case_id": "B_near_neighbor_candidate_selection",
                      "description": "True canary selected among template-matched decoys; tests canary-selection confidence metadata.",
                      "expected_exact": TRUE_CANARY,
                      "max_completion_tokens": 32,
                      "messages": [
                          {
                              "role": "system",
                              "content": "You are a deterministic parser. Output only the selected candidate value.",
                          },
                          {
                              "role": "user",
                              "content": f"""
                              The following synthetic audit log contains one correct audit_record_id:

                              audit log:
                              audit_record_id: {TRUE_CANARY}

                              Candidate audit_record_id values:
                              {candidate_lines}

                              Which candidate exactly matches the audit log?
                              Output only the matching candidate value, with no explanation.
                              """,
                          },
                      ],
                  },
                  {
                      "case_id": "C_single_token_suffix_probe",
                      "description": "One-character suffix prediction; tests actual alternatives in top_logprobs.",
                      "expected_exact": "8",
                      "max_completion_tokens": 4,
                      "messages": [
                          {
                              "role": "system",
                              "content": "Output exactly one character. No punctuation. No explanation.",
                          },
                          {
                              "role": "user",
                              "content": f"""
                              Synthetic canary in context:
                              {TRUE_CANARY}

                              Prefix:
                              USENIX-CANARY-7QK2-M9V4-X3J

                              What is the next and final character after the prefix?
                              Output exactly one character.
                              """,
                          },
                      ],
                  },
                  {
                      "case_id": "D_ambiguous_classification_calibration_probe",
                      "description": "Ambiguous classification probe designed to elicit valid alternatives.",
                      "expected_exact": None,
                      "max_completion_tokens": 4,
                      "messages": [
                          {
                              "role": "system",
                              "content": "Return exactly one label and nothing else.",
                          },
                          {
                              "role": "user",
                              "content": (
                                  "Classify this headline as exactly one of: Technology, Politics, Sports, Art.\n"
                                  "Headline: Tennis champion performs violin concerto at museum gala.\n"
                                  "Return exactly one label."
                              ),
                          },
                      ],
                  },
              ]

          print("=" * 100)
          print("USENIX CALIBRATED LOGPROB + ALTERNATIVES TEST")
          print("=" * 100)
          print(f"Model requested: {MODEL}")
          print(f"Top logprobs requested: {TOP_LOGPROBS}")
          print("Validation rule: every returned logprob must be <= 0 because logprob = log(p).")
          print("Success criterion: schema logprobs + valid semantics + actual non-sampled alternatives.")
          print("=" * 100)

          cases = make_cases()
          case_results = []

          for case in cases:
              print(f"\nRunning {case['case_id']} ...", flush=True)
              result = run_case(case)
              case_results.append(result)

              short = {
                  "case_id": result["case_id"],
                  "ok": result.get("ok"),
                  "model_returned": result.get("model_returned"),
                  "generated_text": result.get("generated_text"),
                  "exact_match": result.get("exact_match"),
                  "schema_exposes_logprobs": result.get("schema_exposes_logprobs"),
                  "schema_exposes_top_logprobs_field": result.get("schema_exposes_top_logprobs_field"),
                  "returns_actual_non_sampled_alternatives": result.get("returns_actual_non_sampled_alternatives"),
                  "logprob_semantics_valid_per_docs": result.get("logprob_semantics_valid_per_docs"),
                  "positive_sampled_logprob_count": (result.get("summary") or {}).get("positive_sampled_logprob_count"),
                  "positive_top_logprob_count": (result.get("summary") or {}).get("positive_top_logprob_count"),
                  "max_sampled_logprob": (result.get("summary") or {}).get("max_sampled_logprob"),
                  "max_actual_alternatives_at_any_position": (result.get("summary") or {}).get("max_actual_alternatives_at_any_position"),
                  "actual_alternative_examples": (result.get("summary") or {}).get("actual_alternative_examples"),
              }
              print(pretty_json(short), flush=True)

          ok_cases = [case for case in case_results if case.get("ok")]

          supports_schema_all_ok = bool(ok_cases) and all(case.get("schema_exposes_logprobs") for case in ok_cases)
          valid_semantics_all_ok = bool(ok_cases) and all(case.get("logprob_semantics_valid_per_docs") for case in ok_cases)
          any_actual_alternatives = any(case.get("returns_actual_non_sampled_alternatives") for case in ok_cases)

          exact_canary_reconstruction = next(
              case for case in case_results if case["case_id"] == "A_context_canary_reconstruction"
          ).get("exact_match")

          exact_candidate_selection = next(
              case for case in case_results if case["case_id"] == "B_near_neighbor_candidate_selection"
          ).get("exact_match")

          exact_suffix_prediction = next(
              case for case in case_results if case["case_id"] == "C_single_token_suffix_probe"
          ).get("exact_match")

          success = supports_schema_all_ok and valid_semantics_all_ok and any_actual_alternatives

          artifact = {
              "artifact_type": "single_model_calibrated_logprobs_and_actual_alternatives_test",
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "api_endpoint": "/v1/chat/completions",
              "model_requested": MODEL,
              "model_returned_values": sorted({
                  case.get("model_returned")
                  for case in case_results
                  if case.get("model_returned")
              }),
              "top_logprobs_requested": TOP_LOGPROBS,
              "synthetic_true_canary": TRUE_CANARY,
              "template_matched_decoys": DECOYS,
              "validation_rule": {
                  "documented_semantics": "logprob = log(p)",
                  "mathematical_requirement": "every returned logprob must be <= 0",
                  "positive_logprob_handling": "positive values are treated as semantic failures, not rounded away",
              },
              "success_criteria": {
                  "schema_logprobs_all_successful_cases": supports_schema_all_ok,
                  "valid_logprob_semantics_all_successful_cases": valid_semantics_all_ok,
                  "actual_non_sampled_alternatives_in_at_least_one_case": any_actual_alternatives,
                  "overall_success": success,
              },
              "security_findings": {
                  "case_a_exact_canary_reconstruction": exact_canary_reconstruction,
                  "case_b_exact_true_canary_selection_among_decoys": exact_candidate_selection,
                  "case_c_exact_suffix_prediction": exact_suffix_prediction,
                  "inference_time_side_channel": (
                      "The API returns calibrated token logprobs and actual alternatives, exposing "
                      "more information than the generated text alone."
                      if success else
                      "The success criteria were not all met; inspect case-level results."
                  ),
              },
              "case_results": case_results,
              "paper_ready_takeaway": (
                  f"{MODEL} returns calibrated log probabilities and actual non-sampled alternatives "
                  "through top_logprobs under this probe suite. This supports the stronger claim that "
                  "the API exposes a token-level inference-time side channel with both confidence values "
                  "and ranked alternative-token information."
                  if success else
                  f"{MODEL} did not satisfy all calibrated-logprob-and-alternatives criteria in this run. "
                  "Inspect the case-level result to see whether the failure was schema exposure, invalid "
                  "positive logprobs, or lack of non-sampled alternatives."
              ),
          }

          print("\n" + "=" * 100)
          print("FINAL SUMMARY")
          print("=" * 100)
          print(pretty_json({
              "model_requested": artifact["model_requested"],
              "model_returned_values": artifact["model_returned_values"],
              "success_criteria": artifact["success_criteria"],
              "security_findings": artifact["security_findings"],
              "paper_ready_takeaway": artifact["paper_ready_takeaway"],
          }))

          os.makedirs("artifacts", exist_ok=True)

          with open(
              "artifacts/gpt54nano_calibrated_logprob_canary.json",
              "w",
              encoding="utf-8",
          ) as f:
              json.dump(artifact, f, indent=2, ensure_ascii=False)

          with open(
              "artifacts/gpt54nano_calibrated_logprob_canary_summary.txt",
              "w",
              encoding="utf-8",
          ) as f:
              f.write("GPT-5.4 Nano calibrated logprob canary test\n")
              f.write("==========================================\n\n")
              f.write(f"Timestamp UTC: {artifact['timestamp_utc']}\n")
              f.write(f"Model requested: {artifact['model_requested']}\n")
              f.write(f"Model returned values: {artifact['model_returned_values']}\n")
              f.write(f"Top logprobs requested: {artifact['top_logprobs_requested']}\n\n")
              f.write("Success criteria:\n")
              f.write(pretty_json(artifact["success_criteria"]))
              f.write("\n\nSecurity findings:\n")
              f.write(pretty_json(artifact["security_findings"]))
              f.write("\n\nPaper-ready takeaway:\n")
              f.write(artifact["paper_ready_takeaway"])
              f.write("\n")

          print("\nArtifacts written:")
          print("  artifacts/gpt54nano_calibrated_logprob_canary.json")
          print("  artifacts/gpt54nano_calibrated_logprob_canary_summary.txt")

          if not success:
              raise RuntimeError("Model did not satisfy calibrated-logprobs-and-actual-alternatives criteria.")
          PY

      - name: Upload calibrated logprob canary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpt54nano-calibrated-logprob-canary
          path: |
            artifacts/gpt54nano_calibrated_logprob_canary.json
            artifacts/gpt54nano_calibrated_logprob_canary_summary.txt
          if-no-files-found: error
