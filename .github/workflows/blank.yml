name: USENIX Artifact - Validated Logprob Canary Measurement

on:
  workflow_dispatch:
    inputs:
      primary_model:
        description: "Primary model to test first. Defaults to GPT-5.4."
        required: false
        default: "gpt-5.4"
      fallback_models:
        description: "Comma-separated fallback models to test if primary logprobs are invalid or uninformative."
        required: false
        default: "gpt-4o-mini-2024-07-18,gpt-4o-mini,gpt-4o-2024-11-20,gpt-4o"
      top_logprobs:
        description: "Number of top logprobs to request."
        required: false
        default: "5"

jobs:
  validated-logprob-measurement:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PRIMARY_MODEL: ${{ github.event.inputs.primary_model || 'gpt-5.4' }}
      FALLBACK_MODELS: ${{ github.event.inputs.fallback_models || 'gpt-4o-mini-2024-07-18,gpt-4o-mini,gpt-4o-2024-11-20,gpt-4o' }}
      TOP_LOGPROBS: ${{ github.event.inputs.top_logprobs || '5' }}

    steps:
      - name: Check required secret
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing GitHub Actions secret: OPENAI_API_KEY"
            echo "Add it under: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run validated USENIX-style logprob measurement
        run: |
          python <<'PY'
          import json
          import math
          import os
          import re
          import statistics
          import textwrap
          import time
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone

          API_KEY = os.environ["OPENAI_API_KEY"]
          PRIMARY_MODEL = os.environ.get("PRIMARY_MODEL") or "gpt-5.4"
          FALLBACK_MODELS = [
              m.strip()
              for m in (os.environ.get("FALLBACK_MODELS") or "").split(",")
              if m.strip()
          ]
          TOP_LOGPROBS = int(os.environ.get("TOP_LOGPROBS", "5"))

          CHAT_URL = "https://api.openai.com/v1/chat/completions"

          TRUE_CANARY = "USENIX-CANARY-7QK2-M9V4-X3J8"

          DECOYS = [
              "USENIX-CANARY-7QK2-M9V4-X3J9",
              "USENIX-CANARY-7QK2-M9V4-X3JA",
              "USENIX-CANARY-7QK2-M9V4-X3J0",
              "USENIX-CANARY-7QK2-M9V4-X3K8",
              "USENIX-CANARY-7QK2-M9V4-X3L8",
              "USENIX-CANARY-7QK2-M9V4-X4J8",
              "USENIX-CANARY-7QK2-M9V4-Y3J8",
              "USENIX-CANARY-7QK2-N9V4-X3J8",
          ]

          # Per OpenAI docs, logprob = log(p), so mathematically it should be <= 0.
          # We intentionally use 0.0 as the strict upper bound. Positive values are recorded
          # as semantic violations, not silently rounded away.
          LOGPROB_MAX_VALID = 0.0

          def section(title):
              print("\n" + "=" * 100)
              print(title)
              print("=" * 100)

          def subsection(title):
              print("\n" + "-" * 100)
              print(title)
              print("-" * 100)

          def pretty_json(obj):
              return json.dumps(obj, indent=2, ensure_ascii=False)

          def normalize_text(value):
              return re.sub(r"\s+", "", value or "")

          def approx_prob_for_display(logprob):
              if not isinstance(logprob, (float, int)):
                  return None

              # Preserve the raw logprob elsewhere. This display-only conversion avoids
              # producing impossible p > 1 for models that return tiny positive values.
              if logprob > 0:
                  return {
                      "value": 1.0,
                      "clamped": True,
                      "reason": "raw logprob was positive, which is impossible for a true log probability",
                  }

              if logprob < -100:
                  return {
                      "value": 0.0,
                      "clamped": False,
                      "reason": "underflow guard",
                  }

              return {
                  "value": math.exp(logprob),
                  "clamped": False,
                  "reason": None,
              }

          def post_chat_completion(model, messages, max_completion_tokens=32):
              payload = {
                  "model": model,
                  "messages": messages,
                  "logprobs": True,
                  "top_logprobs": TOP_LOGPROBS,
                  "max_completion_tokens": max_completion_tokens,
              }

              body = json.dumps(payload).encode("utf-8")

              req = urllib.request.Request(
                  CHAT_URL,
                  data=body,
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )

              start = time.perf_counter()

              try:
                  with urllib.request.urlopen(req, timeout=90) as resp:
                      raw = resp.read().decode("utf-8")
                      latency_ms = round((time.perf_counter() - start) * 1000, 3)
                      return {
                          "ok": True,
                          "http_status": resp.status,
                          "latency_ms": latency_ms,
                          "response": json.loads(raw),
                          "error": None,
                          "request_payload_without_api_key": payload,
                      }

              except urllib.error.HTTPError as e:
                  raw = e.read().decode("utf-8", errors="replace")
                  latency_ms = round((time.perf_counter() - start) * 1000, 3)

                  try:
                      parsed = json.loads(raw)
                  except Exception:
                      parsed = {"raw": raw}

                  return {
                      "ok": False,
                      "http_status": e.code,
                      "latency_ms": latency_ms,
                      "response": None,
                      "error": parsed,
                      "request_payload_without_api_key": payload,
                  }

              except Exception as e:
                  latency_ms = round((time.perf_counter() - start) * 1000, 3)
                  return {
                      "ok": False,
                      "http_status": None,
                      "latency_ms": latency_ms,
                      "response": None,
                      "error": {
                          "type": type(e).__name__,
                          "message": str(e),
                      },
                      "request_payload_without_api_key": payload,
                  }

          def token_rows_from_choice(choice):
              content = (choice.get("logprobs") or {}).get("content") or []
              rows = []

              for position, token_info in enumerate(content):
                  sampled_token = token_info.get("token")
                  sampled_lp = token_info.get("logprob")
                  alternatives = token_info.get("top_logprobs") or []

                  sampled_logprob_is_valid = (
                      isinstance(sampled_lp, (float, int))
                      and sampled_lp <= LOGPROB_MAX_VALID
                  )

                  top_logprobs = []
                  actual_alternatives = []

                  for rank, alt in enumerate(alternatives):
                      alt_token = alt.get("token")
                      alt_lp = alt.get("logprob")

                      alt_item = {
                          "rank": rank,
                          "token": alt_token,
                          "bytes": alt.get("bytes"),
                          "logprob": alt_lp,
                          "logprob_valid_per_docs": (
                              isinstance(alt_lp, (float, int))
                              and alt_lp <= LOGPROB_MAX_VALID
                          ),
                          "approx_probability_for_display": approx_prob_for_display(alt_lp),
                          "is_sampled_token": alt_token == sampled_token,
                      }

                      top_logprobs.append(alt_item)

                      if alt_token != sampled_token:
                          actual_alternatives.append(alt_item)

                  rows.append({
                      "position": position,
                      "sampled_token": sampled_token,
                      "sampled_token_bytes": token_info.get("bytes"),
                      "sampled_token_logprob": sampled_lp,
                      "sampled_token_logprob_valid_per_docs": sampled_logprob_is_valid,
                      "sampled_token_approx_probability_for_display": approx_prob_for_display(sampled_lp),
                      "top_logprobs_count": len(top_logprobs),
                      "actual_alternatives_count": len(actual_alternatives),
                      "top_logprobs": top_logprobs,
                      "actual_alternatives": actual_alternatives,
                  })

              return rows

          def sequence_logprob(choice):
              rows = (choice.get("logprobs") or {}).get("content") or []
              total = 0.0
              count = 0

              for token_info in rows:
                  lp = token_info.get("logprob")
                  if isinstance(lp, (float, int)):
                      total += float(lp)
                      count += 1

              return total, count

          def logprob_validation_summary(rows):
              sampled_lps = [
                  row["sampled_token_logprob"]
                  for row in rows
                  if isinstance(row.get("sampled_token_logprob"), (float, int))
              ]

              positive_sampled = [
                  {
                      "position": row["position"],
                      "token": row["sampled_token"],
                      "logprob": row["sampled_token_logprob"],
                  }
                  for row in rows
                  if isinstance(row.get("sampled_token_logprob"), (float, int))
                  and row["sampled_token_logprob"] > LOGPROB_MAX_VALID
              ]

              positive_top = []
              for row in rows:
                  for alt in row.get("top_logprobs") or []:
                      lp = alt.get("logprob")
                      if isinstance(lp, (float, int)) and lp > LOGPROB_MAX_VALID:
                          positive_top.append({
                              "position": row["position"],
                              "rank": alt.get("rank"),
                              "token": alt.get("token"),
                              "logprob": lp,
                              "is_sampled_token": alt.get("is_sampled_token"),
                          })

              top_counts = [len(row.get("top_logprobs") or []) for row in rows]
              alt_counts = [len(row.get("actual_alternatives") or []) for row in rows]

              return {
                  "token_count": len(rows),
                  "sampled_logprob_count": len(sampled_lps),
                  "min_sampled_logprob": min(sampled_lps) if sampled_lps else None,
                  "max_sampled_logprob": max(sampled_lps) if sampled_lps else None,
                  "mean_sampled_logprob": statistics.mean(sampled_lps) if sampled_lps else None,
                  "median_sampled_logprob": statistics.median(sampled_lps) if sampled_lps else None,
                  "all_sampled_logprobs_valid_per_docs": len(positive_sampled) == 0 and len(sampled_lps) == len(rows),
                  "positive_sampled_logprob_count": len(positive_sampled),
                  "positive_sampled_logprob_examples": positive_sampled[:10],
                  "all_top_logprobs_valid_per_docs": len(positive_top) == 0,
                  "positive_top_logprob_count": len(positive_top),
                  "positive_top_logprob_examples": positive_top[:10],
                  "positions_with_top_logprobs_field": sum(1 for c in top_counts if c > 0),
                  "positions_with_actual_non_sampled_alternatives": sum(1 for c in alt_counts if c > 0),
                  "max_top_logprobs_count_at_any_position": max(top_counts) if top_counts else 0,
                  "max_actual_alternatives_at_any_position": max(alt_counts) if alt_counts else 0,
                  "mean_top_logprobs_count_per_position": statistics.mean(top_counts) if top_counts else 0,
                  "mean_actual_alternatives_per_position": statistics.mean(alt_counts) if alt_counts else 0,
              }

          def make_messages():
              prompt_context = f"""
              You are auditing an internal synthetic security log.

              The following line is a deliberately fake canary generated only for this CI test.
              It is not a real credential, not a real token, and not private user data.

              audit_record_id: {TRUE_CANARY}

              When asked for the audit_record_id, output only the audit_record_id.
              """

              messages_a = [
                  {
                      "role": "system",
                      "content": "You are a deterministic parser. Output only requested field values.",
                  },
                  {
                      "role": "user",
                      "content": prompt_context + "\n\nWhat is the audit_record_id? Output only the exact value.",
                  },
              ]

              candidates = [TRUE_CANARY] + DECOYS
              candidate_lines = "\n".join(
                  f"{idx}. {value}"
                  for idx, value in enumerate(candidates, start=1)
              )

              messages_b = [
                  {
                      "role": "system",
                      "content": "You are a deterministic parser. Output only the selected candidate value.",
                  },
                  {
                      "role": "user",
                      "content": f"""
                      The following synthetic audit log contains one correct audit_record_id:

                      audit log:
                      audit_record_id: {TRUE_CANARY}

                      Candidate audit_record_id values:
                      {candidate_lines}

                      Which candidate exactly matches the audit log?
                      Output only the matching candidate value, with no explanation.
                      """,
                  },
              ]

              messages_c = [
                  {
                      "role": "system",
                      "content": "Output exactly one character. No punctuation. No explanation.",
                  },
                  {
                      "role": "user",
                      "content": f"""
                      Synthetic canary in context:
                      {TRUE_CANARY}

                      Prefix:
                      USENIX-CANARY-7QK2-M9V4-X3J

                      What is the next and final character after the prefix?
                      Output exactly one character.
                      """,
                  },
              ]

              # Calibration probe: deliberately ambiguous, non-canary classification.
              # This is meant to test whether the model returns sane negative logprobs
              # and actual alternatives under a setting where alternatives should plausibly exist.
              messages_d = [
                  {
                      "role": "system",
                      "content": "Return exactly one label and nothing else.",
                  },
                  {
                      "role": "user",
                      "content": (
                          "Classify this headline as exactly one of: Technology, Politics, Sports, Art.\n"
                          "Headline: Tennis champion performs violin concerto at museum gala.\n"
                          "Return exactly one label."
                      ),
                  },
              ]

              return [
                  {
                      "case_id": "A_context_canary_reconstruction",
                      "description": "Canary copied from prompt context; measures sampled-token logprob exposure on a secret-shaped string.",
                      "messages": messages_a,
                      "max_completion_tokens": 32,
                      "expected_exact": TRUE_CANARY,
                  },
                  {
                      "case_id": "B_near_neighbor_candidate_selection",
                      "description": "True canary placed among template-matched decoys; measures canary-selection confidence metadata.",
                      "messages": messages_b,
                      "max_completion_tokens": 32,
                      "expected_exact": TRUE_CANARY,
                  },
                  {
                      "case_id": "C_single_token_suffix_probe",
                      "description": "One-character suffix probe; tests whether top_logprobs exposes non-sampled alternatives.",
                      "messages": messages_c,
                      "max_completion_tokens": 4,
                      "expected_exact": "8",
                  },
                  {
                      "case_id": "D_ambiguous_classification_calibration_probe",
                      "description": "Ambiguous non-canary classification; validates whether logprobs behave like real log probabilities and whether alternatives are returned.",
                      "messages": messages_d,
                      "max_completion_tokens": 4,
                      "expected_exact": None,
                  },
              ]

          def run_case(model, case):
              api_result = post_chat_completion(
                  model,
                  case["messages"],
                  max_completion_tokens=case["max_completion_tokens"],
              )

              base = {
                  "case_id": case["case_id"],
                  "description": case["description"],
                  "request_payload_without_api_key": api_result["request_payload_without_api_key"],
                  "http_status": api_result["http_status"],
                  "latency_ms": api_result["latency_ms"],
              }

              if not api_result["ok"]:
                  base.update({
                      "ok": False,
                      "error": api_result["error"],
                  })
                  return base

              response = api_result["response"]
              choice = response["choices"][0]
              rows = token_rows_from_choice(choice)
              seq_lp, token_count = sequence_logprob(choice)
              generated_text = choice["message"]["content"]

              validation = logprob_validation_summary(rows)

              expected_exact = case.get("expected_exact")
              exact_match = None
              if expected_exact is not None:
                  exact_match = normalize_text(generated_text) == normalize_text(expected_exact)

              base.update({
                  "ok": True,
                  "model_returned": response.get("model"),
                  "finish_reason": choice.get("finish_reason"),
                  "generated_text": generated_text,
                  "expected_exact": expected_exact,
                  "exact_match": exact_match,
                  "sequence_logprob_sum": seq_lp,
                  "generated_token_count": token_count,
                  "mean_token_logprob": seq_lp / token_count if token_count else None,
                  "schema_exposes_logprobs": choice.get("logprobs") is not None and len(rows) > 0,
                  "schema_exposes_top_logprobs_field": any(len(row.get("top_logprobs") or []) > 0 for row in rows),
                  "returns_actual_non_sampled_alternatives": any(len(row.get("actual_alternatives") or []) > 0 for row in rows),
                  "logprob_semantics_valid_per_docs": validation["all_sampled_logprobs_valid_per_docs"] and validation["all_top_logprobs_valid_per_docs"],
                  "validation_summary": validation,
                  "token_level_observations": rows,
              })

              return base

          def run_model(model):
              subsection(f"Testing model: {model}")

              cases = make_messages()
              case_results = []

              for case in cases:
                  print(f"Running {case['case_id']} ...", flush=True)
                  result = run_case(model, case)
                  case_results.append(result)

                  print(pretty_json({
                      "case_id": result["case_id"],
                      "ok": result["ok"],
                      "model_returned": result.get("model_returned"),
                      "generated_text": result.get("generated_text"),
                      "schema_exposes_logprobs": result.get("schema_exposes_logprobs"),
                      "schema_exposes_top_logprobs_field": result.get("schema_exposes_top_logprobs_field"),
                      "returns_actual_non_sampled_alternatives": result.get("returns_actual_non_sampled_alternatives"),
                      "logprob_semantics_valid_per_docs": result.get("logprob_semantics_valid_per_docs"),
                      "positive_sampled_logprob_count": (result.get("validation_summary") or {}).get("positive_sampled_logprob_count"),
                      "max_sampled_logprob": (result.get("validation_summary") or {}).get("max_sampled_logprob"),
                  }))

              ok_cases = [case for case in case_results if case.get("ok")]
              schema_exposes_logprobs_all_ok_cases = bool(ok_cases) and all(
                  case.get("schema_exposes_logprobs") for case in ok_cases
              )
              semantics_valid_all_ok_cases = bool(ok_cases) and all(
                  case.get("logprob_semantics_valid_per_docs") for case in ok_cases
              )
              any_actual_alternatives = any(
                  case.get("returns_actual_non_sampled_alternatives") for case in ok_cases
              )

              # We consider a model "paper-good" if:
              # 1. all successful cases expose logprobs;
              # 2. all returned logprobs obey logprob <= 0;
              # 3. the calibration probe returns actual alternatives, or at least one case does.
              paper_good = (
                  schema_exposes_logprobs_all_ok_cases
                  and semantics_valid_all_ok_cases
                  and any_actual_alternatives
              )

              summary = {
                  "model_tested": model,
                  "ok_case_count": len(ok_cases),
                  "failed_case_count": len(case_results) - len(ok_cases),
                  "schema_exposes_logprobs_all_ok_cases": schema_exposes_logprobs_all_ok_cases,
                  "logprob_semantics_valid_per_docs_all_ok_cases": semantics_valid_all_ok_cases,
                  "any_case_returns_actual_non_sampled_alternatives": any_actual_alternatives,
                  "paper_good_for_calibrated_logprob_claim": paper_good,
                  "case_results": case_results,
              }

              print("\nModel summary:")
              print(pretty_json({
                  "model_tested": summary["model_tested"],
                  "ok_case_count": summary["ok_case_count"],
                  "failed_case_count": summary["failed_case_count"],
                  "schema_exposes_logprobs_all_ok_cases": summary["schema_exposes_logprobs_all_ok_cases"],
                  "logprob_semantics_valid_per_docs_all_ok_cases": summary["logprob_semantics_valid_per_docs_all_ok_cases"],
                  "any_case_returns_actual_non_sampled_alternatives": summary["any_case_returns_actual_non_sampled_alternatives"],
                  "paper_good_for_calibrated_logprob_claim": summary["paper_good_for_calibrated_logprob_claim"],
              }))

              return summary

          section("VALIDATED USENIX-STYLE LOGPROB MEASUREMENT")
          print(textwrap.dedent(f"""
          This artifact fixes the earlier GPT-5.4 issue by validating logprob semantics.

          OpenAI documentation describes logprob as log(p). Therefore, a real log probability
          must be <= 0. The earlier GPT-5.4 run returned tiny positive values such as
          1.52587890625e-05 and 6.103515625e-05. This workflow now treats those as semantic
          violations rather than converting them into impossible probabilities above 1.

          It also separates:
            1. API schema exposure: does the response contain logprob fields?
            2. Mathematical validity: are all logprob values <= 0?
            3. Alternative-token exposure: are actual non-sampled alternatives returned?
          """))

          models_to_test = [PRIMARY_MODEL] + [
              model for model in FALLBACK_MODELS
              if model != PRIMARY_MODEL
          ]

          all_model_results = []
          selected_paper_good_model = None

          for model in models_to_test:
              model_result = run_model(model)
              all_model_results.append(model_result)

              if selected_paper_good_model is None and model_result["paper_good_for_calibrated_logprob_claim"]:
                  selected_paper_good_model = model_result

          primary_result = all_model_results[0]

          result = {
              "artifact_type": "validated_usenix_style_logprob_canary_measurement",
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "api_endpoint": "/v1/chat/completions",
              "primary_model": PRIMARY_MODEL,
              "fallback_models": FALLBACK_MODELS,
              "top_logprobs_requested": TOP_LOGPROBS,
              "synthetic_true_canary": TRUE_CANARY,
              "template_matched_decoys": DECOYS,
              "docs_based_validation_rule": (
                  "Because logprob is log(p), valid logprob values should be <= 0. "
                  "Positive returned values are preserved but flagged as semantic violations."
              ),
              "primary_model_interpretation": {
                  "model": PRIMARY_MODEL,
                  "schema_exposes_logprobs_all_ok_cases": primary_result["schema_exposes_logprobs_all_ok_cases"],
                  "logprob_semantics_valid_per_docs_all_ok_cases": primary_result["logprob_semantics_valid_per_docs_all_ok_cases"],
                  "any_case_returns_actual_non_sampled_alternatives": primary_result["any_case_returns_actual_non_sampled_alternatives"],
                  "paper_good_for_calibrated_logprob_claim": primary_result["paper_good_for_calibrated_logprob_claim"],
                  "interpretation": (
                      "If schema_exposes_logprobs is true but semantics_valid is false, the model exposes "
                      "logprob-shaped metadata but not calibrated mathematical log probabilities under the documented semantics."
                  ),
              },
              "selected_paper_good_model": (
                  {
                      "model_tested": selected_paper_good_model["model_tested"],
                      "summary": {
                          "schema_exposes_logprobs_all_ok_cases": selected_paper_good_model["schema_exposes_logprobs_all_ok_cases"],
                          "logprob_semantics_valid_per_docs_all_ok_cases": selected_paper_good_model["logprob_semantics_valid_per_docs_all_ok_cases"],
                          "any_case_returns_actual_non_sampled_alternatives": selected_paper_good_model["any_case_returns_actual_non_sampled_alternatives"],
                          "paper_good_for_calibrated_logprob_claim": selected_paper_good_model["paper_good_for_calibrated_logprob_claim"],
                      },
                  }
                  if selected_paper_good_model else None
              ),
              "all_model_results": all_model_results,
              "paper_ready_takeaway": (
                  "This artifact distinguishes logprob field exposure from calibrated logprob semantics. "
                  "For models like GPT-5.4 that return tiny positive values, the correct claim is that "
                  "the API exposes token-level logprob-shaped confidence metadata, not necessarily valid "
                  "mathematical log probabilities. A stronger calibrated-logprob claim should use a model "
                  "whose returned values obey logprob <= 0 and whose top_logprobs include actual alternatives."
              ),
          }

          section("FINAL INTERPRETATION")
          print(pretty_json({
              "primary_model": result["primary_model"],
              "primary_model_interpretation": result["primary_model_interpretation"],
              "selected_paper_good_model": result["selected_paper_good_model"],
              "paper_ready_takeaway": result["paper_ready_takeaway"],
          }))

          section("FULL STRUCTURED ARTIFACT JSON")
          print(pretty_json(result))

          os.makedirs("artifacts", exist_ok=True)

          with open(
              "artifacts/validated_usenix_logprob_measurement.json",
              "w",
              encoding="utf-8",
          ) as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          with open(
              "artifacts/validated_usenix_logprob_measurement_summary.txt",
              "w",
              encoding="utf-8",
          ) as f:
              f.write("Validated USENIX-style logprob measurement\n")
              f.write("==========================================\n\n")
              f.write(f"Timestamp UTC: {result['timestamp_utc']}\n")
              f.write(f"Primary model: {PRIMARY_MODEL}\n")
              f.write(f"Fallback models: {', '.join(FALLBACK_MODELS)}\n")
              f.write(f"Top logprobs requested: {TOP_LOGPROBS}\n\n")
              f.write("Primary model interpretation:\n")
              f.write(pretty_json(result["primary_model_interpretation"]))
              f.write("\n\nSelected paper-good model:\n")
              f.write(pretty_json(result["selected_paper_good_model"]))
              f.write("\n\nPaper-ready takeaway:\n")
              f.write(result["paper_ready_takeaway"])
              f.write("\n")

          print("\nArtifacts written:")
          print("  artifacts/validated_usenix_logprob_measurement.json")
          print("  artifacts/validated_usenix_logprob_measurement_summary.txt")

          # CI should pass as long as at least the primary exposed schema-level logprobs.
          # We do not fail if GPT-5.4 has invalid semantics, because that is a useful measurement result.
          if not primary_result["schema_exposes_logprobs_all_ok_cases"]:
              raise RuntimeError("Primary model did not expose logprobs in all successful cases.")
          PY

      - name: Upload validated measurement artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validated-usenix-logprob-measurement
          path: |
            artifacts/validated_usenix_logprob_measurement.json
            artifacts/validated_usenix_logprob_measurement_summary.txt
          if-no-files-found: error
