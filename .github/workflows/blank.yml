name: USENIX Artifact - Exhaustive OpenAI Logprobs Model Sweep

on:
  workflow_dispatch:
    inputs:
      include_non_chat_like_models:
        description: "Also test models that do not look chat-capable by name. This may create many expected failures."
        required: false
        default: "false"
      top_logprobs:
        description: "Number of top logprobs to request."
        required: false
        default: "5"

jobs:
  sweep-openai-logprobs-support:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      INCLUDE_NON_CHAT_LIKE_MODELS: ${{ github.event.inputs.include_non_chat_like_models || 'false' }}
      TOP_LOGPROBS: ${{ github.event.inputs.top_logprobs || '5' }}

    steps:
      - name: Check required secret
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing GitHub Actions secret: OPENAI_API_KEY"
            echo "Add it under: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sweep available OpenAI models for Chat Completions logprobs support
        run: |
          python <<'PY'
          import json
          import math
          import os
          import time
          import urllib.error
          import urllib.request
          from datetime import datetime, timezone

          API_KEY = os.environ["OPENAI_API_KEY"]
          INCLUDE_NON_CHAT_LIKE_MODELS = (
              os.environ.get("INCLUDE_NON_CHAT_LIKE_MODELS", "false").lower() == "true"
          )
          TOP_LOGPROBS = int(os.environ.get("TOP_LOGPROBS", "5"))

          MODELS_URL = "https://api.openai.com/v1/models"
          CHAT_URL = "https://api.openai.com/v1/chat/completions"

          # Tiny synthetic canary. Not a real secret.
          TRUE_CANARY = "USENIX-CANARY-7QK2-M9V4-X3J8"

          CHAT_LIKE_PREFIXES = (
              "gpt-",
              "chatgpt-",
              "o1",
              "o3",
              "o4",
          )

          EXCLUDE_NAME_FRAGMENTS = (
              "embedding",
              "embed",
              "whisper",
              "tts",
              "audio",
              "realtime",
              "transcribe",
              "moderation",
              "image",
              "dall-e",
              "sora",
              "search",
          )

          def http_json(method, url, payload=None, timeout=90):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")

              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      "Authorization": f"Bearer {API_KEY}",
                      "Content-Type": "application/json",
                  },
                  method=method,
              )

              start = time.perf_counter()
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      raw = resp.read().decode("utf-8")
                      latency_ms = round((time.perf_counter() - start) * 1000, 3)
                      return {
                          "ok": True,
                          "status": resp.status,
                          "json": json.loads(raw),
                          "latency_ms": latency_ms,
                          "error": None,
                      }
              except urllib.error.HTTPError as e:
                  raw = e.read().decode("utf-8", errors="replace")
                  latency_ms = round((time.perf_counter() - start) * 1000, 3)
                  try:
                      parsed = json.loads(raw)
                  except Exception:
                      parsed = {"raw": raw}

                  return {
                      "ok": False,
                      "status": e.code,
                      "json": None,
                      "latency_ms": latency_ms,
                      "error": parsed,
                  }
              except Exception as e:
                  latency_ms = round((time.perf_counter() - start) * 1000, 3)
                  return {
                      "ok": False,
                      "status": None,
                      "json": None,
                      "latency_ms": latency_ms,
                      "error": {
                          "type": type(e).__name__,
                          "message": str(e),
                      },
                  }

          def is_chat_like_model_name(model_id):
              mid = model_id.lower()

              if any(fragment in mid for fragment in EXCLUDE_NAME_FRAGMENTS):
                  return False

              return mid.startswith(CHAT_LIKE_PREFIXES)

          def approx_prob(logprob):
              if not isinstance(logprob, (float, int)):
                  return None
              if logprob < -100:
                  return 0.0
              return math.exp(logprob)

          def compact_error(error):
              if not error:
                  return None

              if isinstance(error, dict) and "error" in error:
                  e = error["error"]
                  return {
                      "message": e.get("message"),
                      "type": e.get("type"),
                      "param": e.get("param"),
                      "code": e.get("code"),
                  }

              return error

          def test_chat_logprobs(model_id):
              payload = {
                  "model": model_id,
                  "messages": [
                      {
                          "role": "system",
                          "content": "You are a deterministic parser. Output only the requested value.",
                      },
                      {
                          "role": "user",
                          "content": (
                              "This is a synthetic CI canary, not a real secret:\n"
                              f"audit_record_id: {TRUE_CANARY}\n\n"
                              "Output only the audit_record_id."
                          ),
                      },
                  ],
                  "max_completion_tokens": 32,
                  "logprobs": True,
                  "top_logprobs": TOP_LOGPROBS,
              }

              result = http_json("POST", CHAT_URL, payload=payload)

              base = {
                  "model_id": model_id,
                  "endpoint": "/v1/chat/completions",
                  "requested_logprobs": True,
                  "requested_top_logprobs": TOP_LOGPROBS,
                  "http_status": result["status"],
                  "latency_ms": result["latency_ms"],
              }

              if not result["ok"]:
                  base.update({
                      "supports_chat_completions_logprobs": False,
                      "failure_kind": "api_error",
                      "error": compact_error(result["error"]),
                  })
                  return base

              response = result["json"]
              choice = response["choices"][0]
              logprobs = choice.get("logprobs")
              content = (logprobs or {}).get("content") or []

              has_token_logprobs = False
              has_top_logprobs = False
              first_token_observation = None

              if content:
                  first = content[0]
                  has_token_logprobs = isinstance(first.get("logprob"), (float, int))
                  top = first.get("top_logprobs") or []
                  has_top_logprobs = len(top) > 0

                  first_token_observation = {
                      "token": first.get("token"),
                      "bytes": first.get("bytes"),
                      "logprob": first.get("logprob"),
                      "approx_probability": approx_prob(first.get("logprob")),
                      "top_logprobs": [
                          {
                              "token": item.get("token"),
                              "bytes": item.get("bytes"),
                              "logprob": item.get("logprob"),
                              "approx_probability": approx_prob(item.get("logprob")),
                          }
                          for item in top
                      ],
                  }

              base.update({
                  "supports_chat_completions_logprobs": bool(has_token_logprobs and has_top_logprobs),
                  "failure_kind": None if has_token_logprobs and has_top_logprobs else "missing_logprob_fields",
                  "model_returned": response.get("model"),
                  "generated_text": choice.get("message", {}).get("content"),
                  "has_choice_logprobs": logprobs is not None,
                  "has_token_logprobs": has_token_logprobs,
                  "has_top_logprobs": has_top_logprobs,
                  "first_token_observation": first_token_observation,
              })

              return base

          # ------------------------------------------------------------------
          # 1. List currently available models for this API key.
          # ------------------------------------------------------------------
          model_list_result = http_json("GET", MODELS_URL, timeout=60)

          if not model_list_result["ok"]:
              raise RuntimeError(
                  "Failed to list OpenAI models.\n"
                  f"HTTP status: {model_list_result['status']}\n"
                  f"Error: {json.dumps(model_list_result['error'], indent=2)}"
              )

          models_payload = model_list_result["json"]
          raw_models = models_payload.get("data", [])

          all_model_ids = sorted(
              model.get("id")
              for model in raw_models
              if model.get("id")
          )

          if INCLUDE_NON_CHAT_LIKE_MODELS:
              candidate_model_ids = all_model_ids
          else:
              candidate_model_ids = [
                  mid for mid in all_model_ids
                  if is_chat_like_model_name(mid)
              ]

          # ------------------------------------------------------------------
          # 2. Exhaustively test selected available models.
          # ------------------------------------------------------------------
          results = []

          for index, model_id in enumerate(candidate_model_ids, start=1):
              print(f"[{index}/{len(candidate_model_ids)}] testing {model_id}", flush=True)
              observation = test_chat_logprobs(model_id)
              results.append(observation)

          supported = [
              r for r in results
              if r.get("supports_chat_completions_logprobs")
          ]

          unsupported = [
              r for r in results
              if not r.get("supports_chat_completions_logprobs")
          ]

          # A practical "latest" heuristic: preserve the model IDs and created timestamps
          # from /v1/models where available. Do not pretend lexical order equals release order.
          created_by_id = {
              model.get("id"): model.get("created")
              for model in raw_models
              if model.get("id")
          }

          for row in results:
              row["created_unix_from_models_endpoint"] = created_by_id.get(row["model_id"])

          supported_sorted_by_created = sorted(
              supported,
              key=lambda r: (
                  r.get("created_unix_from_models_endpoint") is not None,
                  r.get("created_unix_from_models_endpoint") or 0,
                  r.get("model_id") or "",
              ),
              reverse=True,
          )

          latest_supported_by_created = (
              supported_sorted_by_created[0] if supported_sorted_by_created else None
          )

          artifact = {
              "artifact_type": "openai_available_model_logprobs_support_sweep",
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "models_endpoint": "/v1/models",
              "test_endpoint": "/v1/chat/completions",
              "include_non_chat_like_models": INCLUDE_NON_CHAT_LIKE_MODELS,
              "top_logprobs_requested": TOP_LOGPROBS,
              "synthetic_canary": TRUE_CANARY,
              "claim_tested": (
                  "Among models currently available to this API key, empirically determine "
                  "which models support token-level logprobs and top_logprobs on Chat Completions."
              ),
              "important_limitation": (
                  "This is an account- and date-specific compatibility sweep. The OpenAI model list "
                  "and parameter support can change over time. The artifact records the exact timestamp, "
                  "model IDs, HTTP statuses, and returned model names."
              ),
              "model_counts": {
                  "all_models_returned_by_models_endpoint": len(all_model_ids),
                  "candidate_models_tested": len(candidate_model_ids),
                  "supported_chat_completions_logprobs": len(supported),
                  "unsupported_or_failed": len(unsupported),
              },
              "latest_supported_by_models_endpoint_created_timestamp": latest_supported_by_created,
              "supported_models": supported_sorted_by_created,
              "unsupported_models": sorted(
                  unsupported,
                  key=lambda r: r.get("model_id") or "",
              ),
              "all_model_ids_returned_by_models_endpoint": all_model_ids,
          }

          os.makedirs("artifacts", exist_ok=True)

          with open(
              "artifacts/openai_logprobs_model_sweep.json",
              "w",
              encoding="utf-8",
          ) as f:
              json.dump(artifact, f, indent=2, ensure_ascii=False)

          print("OPENAI_LOGPROBS_MODEL_SWEEP_SUMMARY")
          print(json.dumps({
              "timestamp_utc": artifact["timestamp_utc"],
              "candidate_models_tested": len(candidate_model_ids),
              "supported_count": len(supported),
              "unsupported_count": len(unsupported),
              "latest_supported_model_id": (
                  latest_supported_by_created.get("model_id")
                  if latest_supported_by_created else None
              ),
              "latest_supported_model_returned": (
                  latest_supported_by_created.get("model_returned")
                  if latest_supported_by_created else None
              ),
              "supported_model_ids": [r["model_id"] for r in supported_sorted_by_created],
          }, indent=2, ensure_ascii=False))
          PY

      - name: Upload model sweep artifact
        uses: actions/upload-artifact@v4
        with:
          name: openai-logprobs-model-sweep
          path: artifacts/openai_logprobs_model_sweep.json
          if-no-files-found: error
