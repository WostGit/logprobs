name: OpenAI Logprobs Support Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-logprobs:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check OpenAI model logprobs support
        run: |
          python <<'PY'
          import json, os, time, urllib.request, urllib.error
          from datetime import datetime, timezone
          from pathlib import Path

          api_key = os.environ["OPENAI_API_KEY"]
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json",
          }

          models_to_test = [
              "gpt-4.1",
              "gpt-4.1-mini",
              "gpt-4.1-nano",
              "gpt-4o",
              "gpt-4o-mini",
              "o3",
              "o3-mini",
              "o4-mini",
          ]

          def post_chat(model):
              payload = {
                  "model": model,
                  "messages": [{"role": "user", "content": "Say exactly: yes"}],
                  "max_completion_tokens": 3,
                  "logprobs": True,
                  "top_logprobs": 5,
              }

              req = urllib.request.Request(
                  "https://api.openai.com/v1/chat/completions",
                  data=json.dumps(payload).encode(),
                  headers=headers,
                  method="POST",
              )

              start = time.perf_counter()
              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      body = json.loads(r.read().decode())
                      lp = body["choices"][0].get("logprobs")
                      return {
                          "model": model,
                          "supports_logprobs": bool(lp and lp.get("content")),
                          "http_status": r.status,
                          "latency_ms": round((time.perf_counter() - start) * 1000, 2),
                          "error": None,
                      }
              except urllib.error.HTTPError as e:
                  raw = e.read().decode(errors="replace")
                  return {
                      "model": model,
                      "supports_logprobs": False,
                      "http_status": e.code,
                      "latency_ms": round((time.perf_counter() - start) * 1000, 2),
                      "error": raw[:1000],
                  }

          now = datetime.now(timezone.utc)
          date = now.strftime("%Y-%m-%d")
          timestamp = now.isoformat()

          results = [post_chat(m) for m in models_to_test]

          archive_dir = Path("docs/archive")
          archive_dir.mkdir(parents=True, exist_ok=True)

          snapshot = {
              "timestamp_utc": timestamp,
              "date": date,
              "results": results,
          }

          archive_file = archive_dir / f"{date}.json"
          archive_file.write_text(json.dumps(snapshot, indent=2), encoding="utf-8")

          latest_file = Path("docs/latest.json")
          latest_file.parent.mkdir(parents=True, exist_ok=True)
          latest_file.write_text(json.dumps(snapshot, indent=2), encoding="utf-8")

          supported = [r for r in results if r["supports_logprobs"]]
          unsupported = [r for r in results if not r["supports_logprobs"]]

          html = f"""<!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>OpenAI Logprobs Support Stats</title>
            <style>
              body {{ font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }}
              table {{ border-collapse: collapse; width: 100%; }}
              th, td {{ border: 1px solid #ddd; padding: 8px; }}
              th {{ background: #f3f3f3; text-align: left; }}
              .yes {{ color: green; font-weight: bold; }}
              .no {{ color: red; font-weight: bold; }}
            </style>
          </head>
          <body>
            <h1>OpenAI Logprobs Support Stats</h1>
            <p>Last updated: {timestamp}</p>
            <p>Supporting models: {len supported} / {len results}</p>

            <table>
              <tr>
                <th>Model</th>
                <th>Shows logprobs?</th>
                <th>HTTP status</th>
                <th>Latency ms</th>
              </tr>
          """

          for r in results:
              cls = "yes" if r["supports_logprobs"] else "no"
              label = "Yes" if r["supports_logprobs"] else "No"
              html += f"""
              <tr>
                <td>{r["model"]}</td>
                <td class="{cls}">{label}</td>
                <td>{r["http_status"]}</td>
                <td>{r["latency_ms"]}</td>
              </tr>
              """

          html += """
            </table>

            <h2>Archive</h2>
            <p>Daily JSON snapshots are saved in <code>archive/YYYY-MM-DD.json</code>.</p>
            <p><a href="latest.json">latest.json</a></p>
          </body>
          </html>
          """

          Path("docs/index.html").write_text(html, encoding="utf-8")
          PY

      - name: Commit archive and webpage
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/
          git commit -m "Update OpenAI logprobs stats" || echo "No changes to commit"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
